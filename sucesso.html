<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liga Local · Bem-vindo!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { overflow-x: hidden; }

    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .sucesso-wrap {
      max-width: 420px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .check-ring {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--brand-light);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      transform: scale(0);
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .check-ring.show { transform: scale(1); }
    .check-ring i { font-size: 28px; color: var(--brand); }

    .sucesso-heading {
      font-family: var(--serif);
      font-size: 26px; letter-spacing: -0.02em;
      color: var(--ink); text-align: center; margin-bottom: 0.4rem;
      opacity: 0; transform: translateY(10px);
      transition: all 0.4s ease 0.3s;
    }
    .sucesso-sub {
      font-size: 14px; color: var(--ink-muted); font-weight: 300;
      text-align: center; margin-bottom: 2rem;
      opacity: 0; transform: translateY(10px);
      transition: all 0.4s ease 0.4s;
    }
    .sucesso-heading.show,
    .sucesso-sub.show { opacity: 1; transform: translateY(0); }

    /* Cartão de membro */
    .member-card {
      background: var(--brand-dark);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      position: relative;
      overflow: hidden;
      opacity: 0; transform: translateY(16px) scale(0.97);
      transition: all 0.5s ease 0.6s;
    }
    .member-card.show { opacity: 1; transform: translateY(0) scale(1); }

    .card-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .card-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; position: relative; z-index: 1;
    }
    .card-logo { font-family: var(--serif); font-size: 16px; color: #fff; }
    .card-logo span { color: #fff; }
    .card-badge {
      font-size: 10px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.1); padding: 3px 10px; border-radius: 20px;
    }

    .card-name {
      font-family: var(--serif); font-size: 22px; color: #fff;
      margin-bottom: 0.25rem; position: relative; z-index: 1;
    }
    .card-location {
      font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 300;
      margin-bottom: 1.25rem; position: relative; z-index: 1;
      display: flex; align-items: center; gap: 4px;
    }

    .card-chips {
      display: flex; flex-wrap: wrap; gap: 6px;
      position: relative; z-index: 1; margin-bottom: 1.25rem;
    }
    .card-chip {
      font-size: 11px; font-weight: 500;
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.1);
      padding: 4px 10px; border-radius: 20px;
      display: flex; align-items: center; gap: 5px;
      opacity: 0;
    }
    .card-chip.in { animation: chipIn 0.3s ease forwards; }

    @keyframes chipIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }

    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 1;
      border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;
    }
    .card-member-num { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 300; }
    .card-member-num strong { color: rgba(255,255,255,0.7); font-weight: 500; }
    .card-level {
      font-size: 11px; font-weight: 500; color: #9FE1CB;
      background: rgba(159,225,203,0.12); padding: 3px 10px; border-radius: 20px;
    }

    /* Ações */
    .sucesso-actions {
      display: flex; flex-direction: column; gap: 8px;
      opacity: 0; transform: translateY(10px);
      transition: all 0.4s ease 1s;
    }
    .sucesso-actions.show { opacity: 1; transform: translateY(0); }

    .btn-share {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--brand); color: #fff; border: none;
      border-radius: var(--r-md); padding: 13px;
      font-family: var(--sans); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-share:hover { background: var(--brand-dark); }

    .btn-home {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; color: var(--ink-muted);
      border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px;
      font-family: var(--sans); font-size: 14px; cursor: pointer; transition: all 0.2s;
    }
    .btn-home:hover { border-color: var(--ink-muted); color: var(--ink); }
  </style>
</head>
<body>

  <canvas id="confetti-canvas"></canvas>

  <!-- NAVBAR -->
  <header class="nav">
    <div class="container">
      <nav class="nav-inner">
        <a href="index.html" class="nav-logo">Liga<span>Local</span></a>
      </nav>
    </div>
  </header>

  <main>
    <div class="sucesso-wrap">

      <div class="check-ring" id="check-ring">
        <i class="ti ti-check" aria-hidden="true"></i>
      </div>

      <h1 class="sucesso-heading" id="heading">Estás dentro!</h1>
      <p class="sucesso-sub" id="sub">
        Verifica o teu email para ativar a subscrição.<br>O teu primeiro jogo está à espera.
      </p>

      <div class="member-card" id="member-card">
        <div class="card-grid"></div>
        <div class="card-top">
          <span class="card-logo">Liga<span>Local</span></span>
          <span class="card-badge">Membro</span>
        </div>
        <div class="card-name" id="card-name">Jogador</div>
        <div class="card-location" id="card-location">
          <i class="ti ti-map-pin" style="font-size:12px;" aria-hidden="true"></i>
          Aveiro
        </div>
        <div class="card-chips" id="card-chips"></div>
        <div class="card-footer">
          <div class="card-member-num">Nº <strong>#00241</strong></div>
          <div class="card-level" id="card-level">Jogador</div>
        </div>
      </div>

      <div class="sucesso-actions" id="actions">
        <a href="#" id="btn-newsletter" class="btn-share">
          <i class="ti ti-mail" aria-hidden="true"></i>
          Ver a minha newsletter
        </a>
        <button class="btn-share" onclick="partilhar()" style="background:transparent;border:1px solid rgba(28,31,30,0.15);color:var(--ink-muted);">
          <i class="ti ti-share" aria-hidden="true"></i>
          Desafiar um amigo
        </button>
        <a href="index.html" class="btn-home">
          <i class="ti ti-home" aria-hidden="true"></i>
          Voltar ao início
        </a>
      </div>

    </div>
  </main>

  <script src="js/main.js"></script>
  <script>
    /* --- Dados do localStorage --- */
    (function () {
      var localLabels = {
        aveiro: 'Aveiro cidade', ilhavo: 'Ílhavo', ovar: 'Ovar',
        agueda: 'Águeda', oliveira: 'Oliveira do Bairro',
        estarreja: 'Estarreja', murtosa: 'Murtosa', outra: 'Outra'
      };
      var nivelLabels = { casual: 'Casual', intermedio: 'Intermédio', competitivo: 'Competitivo' };
      var modalLabels = {
        futebol: 'Futebol', basquetebol: 'Basquetebol', futsal: 'Futsal',
        padel: 'Padel', voleibol: 'Voleibol', outra: 'Outra'
      };
      var modalIcons = {
        futebol: 'ti-ball-football', basquetebol: 'ti-ball-basketball',
        futsal: 'ti-ball-football', padel: 'ti-racket',
        voleibol: 'ti-ball-volleyball', outra: 'ti-plus'
      };

      var state = {};
      try {
        var saved = localStorage.getItem('ll_state');
        if (saved) state = JSON.parse(saved);
      } catch(e) {}

      var nome     = state.nome                           || localStorage.getItem('ll_nome')  || '';
      var local    = state.localidade                     || localStorage.getItem('ll_local') || '';
      var modalStr = JSON.stringify(state.modalidades     || []);
      var nivel    = state.nivel                          || '';
      var plano    = localStorage.getItem('ll_plano')    || 'free';

      localStorage.clear();

      /* Heading */
      var firstName = nome ? nome.split(' ')[0] : '';
      var headingEl = document.getElementById('heading');
      if (headingEl && firstName) headingEl.textContent = 'Estás dentro, ' + firstName + '!';

      /* Nome no cartão */
      var cardNameEl = document.getElementById('card-name');
      if (cardNameEl) cardNameEl.textContent = nome || 'Jogador';

      /* Localização */
      var locationEl = document.getElementById('card-location');
      if (locationEl) {
        var locLabel = localLabels[local] || 'Aveiro';
        locationEl.innerHTML = '<i class="ti ti-map-pin" style="font-size:12px;" aria-hidden="true"></i> ' + locLabel;
      }

      /* Modalidades */
      var chipsEl = document.getElementById('card-chips');
      if (chipsEl) {
        var modalidades = JSON.parse(modalStr);
        if (modalidades.length) {
          chipsEl.innerHTML = modalidades.map(function (m) {
            return '<div class="card-chip">'
              + '<i class="ti ' + (modalIcons[m] || 'ti-activity') + '" style="font-size:12px;" aria-hidden="true"></i> '
              + (modalLabels[m] || m)
              + '</div>';
          }).join('');
        }
      }

      /* Nível */
      var levelEl = document.getElementById('card-level');
      if (levelEl) levelEl.textContent = nivelLabels[nivel] || 'Jogador';

      /* Badge do plano */
      var badgeEl = document.querySelector('.card-badge');
      if (badgeEl) {
        if (plano === 'premium') {
          badgeEl.textContent = 'Premium';
          badgeEl.style.background = 'rgba(74,140,127,0.25)';
          badgeEl.style.color = '#9FE1CB';
        } else {
          badgeEl.textContent = 'Membro Free';
        }
      }

      /* Link para newsletter correta */
      var nlBtn = document.getElementById('btn-newsletter');
      if (nlBtn) {
        var nomeParam = nome ? '?nome=' + encodeURIComponent(nome) : '';
        if (plano === 'premium') {
          nlBtn.href = 'newsletter-premium.html' + nomeParam;
        } else {
          nlBtn.href = 'newsletter-free.html' + nomeParam;
        }
      }
    })();

    /* --- Confetti --- */
    var canvas = document.getElementById('confetti-canvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var animFrame;

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function launchConfetti() {
      resizeCanvas();
      particles = [];
      var colors = ['#4A8C7F','#9FE1CB','#2E5F56','#EAF3F1','#6B7370'];
      for (var i = 0; i < 100; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: -10 - Math.random() * 60,
          w: 6 + Math.random() * 8,
          h: 4 + Math.random() * 5,
          color: colors[Math.floor(Math.random() * colors.length)],
          rot: Math.random() * Math.PI * 2,
          vx: (Math.random() - 0.5) * 3,
          vy: 2 + Math.random() * 3,
          vr: (Math.random() - 0.5) * 0.15,
          alpha: 1
        });
      }
      drawConfetti();
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      var alive = false;
      particles.forEach(function(p) {
        p.x += p.vx; p.y += p.vy; p.rot += p.vr;
        if (p.y > canvas.height * 0.65) p.alpha -= 0.025;
        if (p.alpha > 0) alive = true;
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (alive) animFrame = requestAnimationFrame(drawConfetti);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    /* --- Chips --- */
    function animateChips() {
      document.querySelectorAll('.card-chip').forEach(function(chip, i) {
        setTimeout(function() { chip.classList.add('in'); }, i * 120);
      });
    }

    /* --- Sequência --- */
    function runSequence() {
      setTimeout(function() { document.getElementById('check-ring').classList.add('show'); }, 100);
      setTimeout(function() { launchConfetti(); }, 300);
      setTimeout(function() {
        document.getElementById('heading').classList.add('show');
        document.getElementById('sub').classList.add('show');
      }, 400);
      setTimeout(function() { document.getElementById('member-card').classList.add('show'); }, 700);
      setTimeout(function() { animateChips(); }, 1100);
      setTimeout(function() { document.getElementById('actions').classList.add('show'); }, 1200);
    }

    /* --- Partilha --- */
    function partilhar() {
      if (navigator.share) {
        navigator.share({
          title: 'Liga Local',
          text: 'Junta-te a mim na Liga Local — jogos abertos em Aveiro!',
          url: window.location.origin
        });
      } else {
        navigator.clipboard.writeText(window.location.origin)
          .then(function() { alert('Link copiado!'); });
      }
    }

    window.addEventListener('resize', resizeCanvas);
    runSequence();
  </script>

</body>
</html>
